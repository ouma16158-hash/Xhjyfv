<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Onraiser – Company Positions</title>
  <link rel="stylesheet" href="dashboard_style.css" />
  <style>
    body { background:#f5f7fa; margin:0; }
    .cj-header { background:linear-gradient(135deg,#007bff,#00b894); color:white; padding:14px 20px; font-weight:700; font-size:18px; }
    .cj-back { display:inline-block; color:white; text-decoration:none; margin-right:12px; font-size:14px; }
    .cj-container { max-width:760px; margin:18px auto; padding:0 14px; }
    .company-card { background:white; border-radius:10px; padding:16px; box-shadow:0 1px 6px rgba(0,0,0,0.08); margin-bottom:18px; display:flex; gap:14px; align-items:flex-start; }
    .company-card img.logo { width:80px; height:80px; border-radius:8px; object-fit:cover; }
    .company-card h2 { margin:0 0 4px; font-size:18px; color:#222; }
    .company-card p { margin:2px 0; color:#555; font-size:14px; }
    .job-card { background:white; border-radius:10px; padding:14px 16px; box-shadow:0 1px 6px rgba(0,0,0,0.08); margin-bottom:12px; border-left:4px solid #007bff; }
    .job-card h3 { margin:0 0 6px; font-size:16px; color:#007bff; }
    .job-meta { font-size:12px; color:#555; margin-bottom:6px; }
    .job-meta span { background:#e8f4ff; color:#007bff; border-radius:4px; padding:2px 7px; margin-right:5px; }
    .job-card p { margin:6px 0; font-size:13px; color:#444; }
    .apply-btn { background:linear-gradient(135deg,#007bff,#00b894); color:white; border:none; padding:8px 18px; border-radius:6px; cursor:pointer; font-weight:600; font-size:13px; margin-top:8px; }
    .apply-btn:disabled { background:#aaa; cursor:not-allowed; }
    .applied-badge { background:#e8fff5; color:#00b894; border-radius:6px; padding:6px 12px; font-weight:600; font-size:13px; display:inline-block; margin-top:8px; }
    .empty { text-align:center; color:#888; padding:24px; background:white; border-radius:10px; }
  </style>
</head>
<body>
  <div class="cj-header">
    <a href="dashboard_page.html" class="cj-back">← Back</a>
    Onraiser
  </div>
  <main class="cj-container" id="cjMain">
    <p style="text-align:center;color:#888;">Loading...</p>
  </main>
  <script src="config.js"></script>
  <script src="company-jobs.js"></script>
</body>
</html>
